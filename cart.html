<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>VEXO Cart</title>
</head>

<body class="bg-zinc-100">

  <!-- Announcement -->

  <div class="bg-black text-white text-center py-2 text-[10px]">
    FREE SHIPPING ON ORDERS OVER $50
  </div>

  <!-- Navbar -->

  <div class="navbar bg-white border-b">

    <div class="flex-1">
      <a href="fitness.html" class="text-2xl font-black">
        VEXO
      </a>

    </div>

    <div class="text-[15px] hidden md:flex gap-8">
      <a class="hover:border-b-2 cursor-pointer">Men</a>
      <a class="hover:border-b-2 cursor-pointer ">Women</a>
      <a class="hover:border-b-2 cursor-pointer ">Accessories</a>
    </div>

  </div>

  <!-- Main -->

  <main class="max-w-7xl mx-auto px-6 py-3">
    <div class="flex">
      <h1 class="text-5xl font-black mb-6">
        CART
      </h1>
      <p class="mt-6 js-cart-quantity">[ 4 ITEMS ]</p>
    </div>

    <div class="grid lg:grid-cols-3 gap-10">

      <!-- Cart Items -->

      <section class="lg:col-span-2">

        <div class="space-y-6">

          <!-- Item -->

          <div class="card bg-white shadow-sm cart-content">

            <div class="card-body cart-box">

              <!---- <div class="flex gap-6">

                <img src="img/products/access1.jpg" class="w-28 h-28 object-cover rounded">

                <div class="flex-1">

                  <h2 class="font-bold ">
                    Elite Performance Tee
                  </h2>

                  <p class="text-gray-500 text-[10px]">
                    Grey • Size M
                  </p>

                  <div class="flex items-center gap-3 mt-4">

                    <button class="btn btn-sm" id="decrement">
                      -
                    </button>

                    <span>1</span>

                    <button class="btn btn-sm" id="increment">
                      +
                    </button>

                  </div>

                </div>

                <div class="text-right flex flex-col">

                  <p class="font-bold">
                    $28
                  </p>
                  <div >
                   <a class="border-none rounded-full shadow-2xl  active:text-blue-900" href=""><i class="fa-solid fa-heart"></i></a>

                    <a class="border-none rounded-full shadow-2xl active:text-blue-900" href=""><i class="fa-solid fa-trash-can"></i></a>
                  </div>
                </div>

              </div>
---->
            </div>

          </div>

          <!-- Repeat More Items -->

        </div>

      </section>

      <!-- Summary -->

      <aside>

        <div class="card bg-white shadow-lg sticky top-6">

          <div class="card-body">

            <h2 class="card-title text-2xl">
              Order Summary
            </h2>

            <div class="space-y-2 mt-4">

              <div class="flex justify-between">
                <span>Subtotal</span>
                <span>$162</span>
              </div>

              <div class="flex justify-between">
                <span>Save</span>
                <span>-$16</span>
              </div>

              <div class="divider"></div>

              <div class="flex justify-between  font-bold">
                <span>Total</span>
                <span class="total-price">$145</span>
              </div>
              <p class="opacity-40">Taxes and shipping calculated at checkout</p>
            </div>

            <div class="mt-6">

              <label class="label">
                Promo Code
              </label>

              <div class="join w-full ">

                <input class="input input-bordered join-item w-full text-[10px]" placeholder="ENTER PROMO CODE">

                <button class="btn btn-neutral join-item text-[10px] hover:-transition-scale(1.1) cursor-pointer">
                  APPLY
                </button>

              </div>

            </div>

            <button class="btn btn-neutral w-full mt-6 hover:cursor-pointer checkout">
              CHECKOUT
            </button>

          </div>

        </div>

      </aside>

    </div>

  </main>

  <script src="data/cart.js"></script>
</body>

</html>
